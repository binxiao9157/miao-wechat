<!doctype html>
<html lang="zh-CN" style="background-color: #FFF9F5; color-scheme: light;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FFF9F5" />
    <meta name="msapplication-TileColor" content="#FFF9F5" />
    <meta name="color-scheme" content="light" />

    <!-- 关键资源预加载 -->
    <link rel="preload" as="image" href="/logo.png" />
    
    <!-- Google Fonts 异步加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Miao" />
    <link rel="icon" type="image/png" href="/icon-32.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <style>
      :root { 
        --splash-bg: #FFF9F5; 
        color-scheme: light;
      }
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        background-color: #FFF9F5 !important;
        height: 100% !important;
        width: 100% !important;
        overflow: hidden !important;
        touch-action: pan-x pan-y;
      }
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #FFF9F5 !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
      }
      #splash-screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #E5D5C8 1px, transparent 1px);
        background-size: 32px 32px;
        opacity: 0.15;
        z-index: 0;
      }
      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-screen .splash-content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        animation: splash-entry 0.8s ease-out;
      }
      @keyframes splash-entry {
        0% { opacity: 0; transform: scale(0.92) translateY(10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      #splash-screen .splash-logo {
        width: 90px;
        height: 90px;
        object-fit: contain;
        filter: drop-shadow(0 12px 24px rgba(232, 159, 113, 0.25));
      }
      #splash-screen .splash-text {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 34px;
        color: #633E1D;
        letter-spacing: 4px;
        background: linear-gradient(135deg, #633E1D 0%, #E89F71 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
    
    <!-- Open Graph / WeChat Social Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Miao - 记录与猫咪的每一个瞬间" />
    <meta property="og:description" content="开启您与猫咪的数字治愈之旅" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://mmdd10.tech" />
    <link rel="image_src" href="/og-image.jpg" />
    <meta name="twitter:image" content="/og-image.jpg" />
    <meta name="thumbnail" content="/og-image.jpg" />
    <meta itemprop="image" content="/og-image.jpg" />
    
    <title>Miao - 遇见你的数字猫咪</title>
    <script>document.documentElement.style.backgroundColor = '#FFF9F5';</script>
  </head>
  <body style="background-color: #FFF9F5;">
    <!-- WeChat Share Image Fallback (Hidden) -->
    <div style="display:none;">
      <img src="/og-image.jpg" alt="share" />
    </div>

    <!-- 启动屏：纯 HTML/CSS，不依赖 JS 框架，首帧即渲染 -->
    <div id="splash-screen">
      <div class="splash-content">
        <img src="/logo.png" alt="Miao" class="splash-logo" />
        <div class="splash-text">Miao</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
