<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFF9F5" />
    <!-- Google Fonts 异步加载：先用系统字体渲染，字体到达后无缝替换 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Miao" />
    <link rel="icon" type="image/png" href="/icon-32.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <!-- iOS Splash Screen Placeholder -->
    <link rel="apple-touch-startup-image" href="/og-image.jpg" />
    
    <!-- Open Graph / WeChat Social Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Miao - 记录与猫咪的每一个瞬间" />
    <meta property="og:description" content="开启您与猫咪的数字治愈之旅" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://www.mmdd10.tech" />
    <link rel="image_src" href="/og-image.jpg" />
    <meta name="twitter:image" content="/og-image.jpg" />
    <meta name="thumbnail" content="/og-image.jpg" />
    
    <!-- WeChat specific: First image in body is used as fallback -->
    <meta itemprop="image" content="/og-image.jpg" />
    
    <title>Miao - 遇见你的数字猫咪</title>
  </head>
  <body style="background-color: #FFF5F0;">
    <!-- WeChat Share Image Fallback (Hidden) -->
    <div style="display:none;">
      <img src="/og-image.jpg" alt="share" />
    </div>
    <div id="root">
      <div style="position: fixed; inset: 0; background-color: #FFF5F0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
        <div style="width: 96px; height: 96px; background-color: white; border-radius: 50%; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
          <span style="font-size: 24px; font-weight: 900; color: #FF9D76; font-family: system-ui, -apple-system, sans-serif;">Miao</span>
        </div>
        <div style="display: flex; gap: 4px;">
          <div style="width: 8px; height: 8px; background-color: #FF9D76; border-radius: 50%;"></div>
          <div style="width: 8px; height: 8px; background-color: #FF9D76; border-radius: 50%;"></div>
          <div style="width: 8px; height: 8px; background-color: #FF9D76; border-radius: 50%;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
